worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 256;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 50m;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    server {
        listen 8080;

        # Vite hashed assets — cache forever (filenames change on rebuild)
        location /assets/ {
            root /app/ui/dist;
            expires 1y;
            add_header Cache-Control "public, immutable";
            access_log off;
        }

        # Other static files (favicon, fonts) — short cache with revalidation
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot)$ {
            root /app/ui/dist;
            expires 7d;
            add_header Cache-Control "public";
            access_log off;
        }

        # API + SSE — proxy to uvicorn
        location /api/ {
            proxy_pass http://127.0.0.1:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;

            # SSE support
            proxy_buffering off;
            proxy_cache off;
            proxy_set_header Connection '';
            proxy_http_version 1.1;
            chunked_transfer_encoding off;
        }

        # SPA fallback — serve index.html for client-side routing (no cache)
        location / {
            root /app/ui/dist;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache";
        }
    }
}
